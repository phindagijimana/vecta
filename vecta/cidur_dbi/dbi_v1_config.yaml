# DBI v1 — machine-readable parameters (Phase 1 deliverable)
# Cohort: CIDUR-style XNAT export; series unit = one scan folder with DICOM/files/*.dcm
# Version: 1.0.5

version: "1.0.5"
spec_date: "2026-04-10"

# Composite score: weighted mean over applicable components (N/A excluded from denominator).
# Weights must sum to 1.0 for components that are always applicable; when a component is N/A,
# renormalize over applicable weights (see specification).
weights:
  metadata_completeness: 0.28
  protocol_naming: 0.18
  gradient_integrity: 0.22
  spatial_consistency: 0.17
  naming_compliance: 0.15
  drift_control: 0.00   # v1 retrospective: not scored (see spec); keep 0 or omit from sum

# Minimum physical plausibility (millimeters)
spatial:
  min_pixel_spacing_mm: 0.05
  max_pixel_spacing_mm: 15.0
  min_slice_thickness_mm: 0.05
  max_slice_thickness_mm: 20.0

# Universal DICOM tags (keyword, group-element hex) — informative; reader uses pydicom Tag
tags_universal:
  - ["Modality", "00080060"]
  - ["Manufacturer", "00080070"]
  - ["ManufacturerModelName", "00081090"]
  - ["MagneticFieldStrength", "00180087"]
  - ["SeriesInstanceUID", "0020000E"]
  - ["StudyInstanceUID", "0020000D"]
  - ["SeriesDescription", "0008103E"]
  - ["ProtocolName", "00181030"]

tags_spatial:
  - ["PixelSpacing", "00280030"]
  - ["ImagerPixelSpacing", "00181164"]
  - ["SliceThickness", "00180050"]
  - ["SpacingBetweenSlices", "00180088"]

# Diffusion encoding: see DBI_v1_SPECIFICATION.md §4.3 (multiframe, Enhanced MR, private tags).

# Regex: scan folder basename (e.g. 6-SAG_3D_T2_FLAIR)
naming:
  scan_folder_pattern: '^[0-9]+-'
  derivative_tokens: ["ADC", "FA", "TRACE", "TRACEW", "ColFA", "MD", "RGB", "mIP", "MIP", "ORIG"]

  # ── Community-Standards Naming Compliance ──────────────────────────────────────
  # Binary tests grounded in published community standards that simultaneously
  # improve downstream AI/ML inference, automated BIDS conversion, pipeline
  # routing, and programmatic data cleaning.
  #
  # Each convention cites its normative source(s) and the downstream workflows
  # it enables.  Evaluated only when combined text (folder basename +
  # SeriesDescription + ProtocolName) is non-empty.  Each passes if regex search
  # matches that combined string.  Sites may override (enabled: false) when a
  # convention conflicts with a justified local SOP, but the defaults are
  # institution-independent by construction.
  automation_conventions:
    - id: no_control_chars
      rationale: >-
        Strings free of ASCII control characters (0x00–0x1F incl. tab/newline)
        are required by JSON (RFC 8259) for valid BIDS sidecar emission and are
        safe for shell pipelines, logging frameworks, and ML dataset manifests.
      source: "RFC 8259 (JSON); BIDS sidecar spec (Gorgolewski et al. 2016)"
      downstream_benefit:
        - "BIDS conversion: dcm2niix sidecar JSON output (Li et al. 2016)"
        - "Data cleaning: pandas/CSV ingest without encoding errors"
        - "AI/ML: dataset loader string fields (PyTorch DataLoader, TFRecord)"
      regex: '^[^\x00-\x1f]*\Z'
      enabled: true

    - id: bids_entity_tokens
      rationale: >-
        BIDS entity keys (run-, acq-, dir-, echo-, flip-, inv-, ses-, sub-) are
        the community standard for encoding acquisition parameters in filenames.
        Their presence in raw SeriesDescription or ProtocolName signals
        prospective BIDS alignment at the scanner console, reducing HeuDiConv
        heuristic complexity.
      source: "BIDS v1.9 (Gorgolewski et al. 2016); HeuDiConv (Halchenko et al. 2024)"
      downstream_benefit:
        - "BIDS conversion: HeuDiConv heuristic auto-detection (Halchenko et al. 2024)"
        - "Automation: deterministic file renaming without manual mapping tables"
        - "AI/ML: structured metadata parsing for experiment-level feature extraction"
      regex: '(?i)(?<![A-Za-z0-9])(?:run|acq|dir|echo|flip|inv|ses|sub)[_-][A-Za-z0-9]'
      enabled: true

    - id: modality_contrast_lexicon
      rationale: >-
        Standardized modality and contrast tokens (T1w, T2w, FLAIR, DWI, BOLD,
        ASL, SWI, etc.) from the BIDS suffix vocabulary and consortium protocol
        guides (ENIGMA, ADNI, TRACK-TBI) enable deterministic series routing in
        automated pipelines without reliance on vendor-specific private tags.
      source: "BIDS suffixes (Gorgolewski et al. 2016); ENIGMA protocols (Thompson et al. 2020); ADNI MRI procedures (Jack et al. 2008)"
      downstream_benefit:
        - "BIDS conversion: suffix assignment in dcm2niix/HeuDiConv"
        - "Pipeline routing: fMRIPrep, MRIQC series selection (Esteban et al. 2019)"
        - "AI/ML: NLP-free modality classification from structured naming"
        - "Data cleaning: automated QC stratification by modality"
      regex: '(?i)\b(T1w|T2w|FLAIR|DWI|DTI|BOLD|fMRI|rsfMRI|ASL|MPRAGE|SWI|EPI|field\s*map|fmap|anat|func|dwi)\b'
      enabled: true

    - id: token_separators
      rationale: >-
        Machine-parseable token boundaries (hyphen or underscore between
        alphanumeric segments) follow BIDS filename convention and POSIX
        portable filename guidance. They enable reliable regex/split-based
        metadata extraction without ambiguous whitespace or special characters.
      source: "BIDS filename spec (Gorgolewski et al. 2016); IEEE Std 1003.1 (POSIX portable filenames)"
      downstream_benefit:
        - "BIDS conversion: predictable token parsing during filename construction"
        - "Data cleaning: str.split('_') / regex extraction in pandas pipelines"
        - "AI/ML: tokenization for NLP-based series classifiers"
        - "Automation: safe shell globbing and path manipulation"
      regex: '[A-Za-z0-9][-_][A-Za-z0-9]'
      enabled: true

    - id: no_phi_leak_tokens
      rationale: >-
        SeriesDescription and ProtocolName should not contain tokens resembling
        patient identifiers (date patterns, MRN-like digit runs ≥7 digits, or
        name-like mixed-case words that are not standard modality terms).
        De-identification best practices (DICOM PS3.15 Annex E; Aryanto et al.
        2015) and HIPAA Safe Harbor require scrubbing such fields before sharing.
      source: "DICOM PS3.15 Annex E; Aryanto et al. 2015 (J Digital Imaging); HIPAA Safe Harbor"
      downstream_benefit:
        - "Data cleaning: automated PHI detection before dataset release"
        - "AI/ML: safe training data curation without manual redaction"
        - "BIDS conversion: clean sidecar strings without PHI contamination"
      regex: '^(?!.*\b\d{7,}\b)(?!.*\b\d{1,2}[/\-]\d{1,2}[/\-]\d{2,4}\b).+$'
      enabled: true

    - id: sequence_param_encoding
      rationale: >-
        Encoding key acquisition parameters in the series name (e.g., b-value,
        direction count, TE, TR, flip angle) following consortium conventions
        (ADNI, ENIGMA, TRACK-TBI) enables automated parameter verification
        without opening DICOM headers, accelerating both QC triage and ML
        feature extraction.
      source: "ENIGMA-DTI protocol (Thompson et al. 2020); ADNI MRI technical procedures (Jack et al. 2008)"
      downstream_benefit:
        - "Automation: parameter cross-check between name and DICOM header"
        - "AI/ML: feature extraction from filename without DICOM parsing"
        - "Data cleaning: batch anomaly detection (mismatched name vs header)"
        - "BIDS conversion: informed acq- entity assignment"
      regex: '(?i)(\bb\d{2,4}\b|\d+\s*dir|\bTE\s*\d|\bTR\s*\d|\bflip\s*\d)'
      enabled: true

  # ── Per-Class SeriesDescription Compliance ─────────────────────────────────────
  # After heuristic classification, ALL listed regexes must match trimmed
  # SeriesDescription alone.  Empty description → check fails (0).
  # Omitted classes incur no extra check.  See DBI_v1_SPECIFICATION.md §4.5.
  #
  # Patterns align with BIDS modality suffixes (Gorgolewski et al. 2016),
  # dcm2niix heuristic expectations (Li et al. 2016), and multi-site consortium
  # naming guides (ENIGMA: Thompson et al. 2020; ADNI: Jack et al. 2008).
  # Compliance enables deterministic BIDS conversion, automated pipeline
  # routing (fMRIPrep, MRIQC), and ML-based series classification.
  class_series_description_compliance:
    dwi:
      all_match:
        - '(?i)(DTI|DWI|dwi|dti)'
        - '(?i)AP[_\s-]*\d+.*(DIRECTION|DIR|direction)s?'
    fmap:
      all_match:
        - '(?i)(field[\s_-]*map|fmap|gre_field|GRE_FIELD|FMRI.*field)'
        - '(?i)PA[_\s-]*\d+.*(DIRECTION|DIR|direction)s?'
    bold:
      all_match:
        - '(?i)(fMRI|fmri|BOLD|RESTING|TASK|EPI|rsfMRI)'
    asl:
      all_match:
        - '(?i)ASL'
    flair:
      all_match:
        - '(?i)(FLAIR|flair)\s*\Z'
    perf:
      all_match:
        - '(?i)(perf|DSC|DCE|CBF)'
    t1_anat:
      all_match:
        - '(?i)(MPRAGE|SPGR|FSPGR|BRAVO|IR[\s_]FSPGR)\s*\Z'
    localizer:
      all_match:
        - '(?i)(localizer|Localizer|LOC|scout|Scout)'
    t2_anat:
      all_match:
        - '(?i)(T2|BLADE)'
        - '(?i)THIN\s*\Z'
    swi:
      all_match:
        - '(?i)(SWI|SWAN)'

  # ── Derived / Reformatted Series Naming ──────────────────────────────────────
  # If combined folder + SeriesDescription + ProtocolName matches a marker
  # (delimiter-bounded), SeriesDescription must end with "reformat" or "derived".
  # Follows BIDS derivatives specification and dcm2niix derivative handling
  # (Li et al. 2016) for unambiguous raw-vs-derived series discrimination.
  # Enables: AI/ML training set curation (exclude derived maps), automated BIDS
  # derivatives layout, and data cleaning pipelines that separate raw volumes
  # from scanner-generated scalar maps.
  derived_scan_naming:
    enabled: true
    markers:
      - "ADC"
      - "FA"
      - "TRACE"
      - "TRACEW"
      - "ColFA"
      - "MD"
      - "RGB"
      - "mIP"
      - "MIP"
      - "ORIG"
    series_description_suffix_regex: '(?i)(reformat|derived)\s*\Z'

# Optional prospective protocol token (legacy CIDUR expected to fail — scored separately as P_ideal)
protocol_token:
  required_for_full_credit: false
  pattern: 'PROTO_[A-Z0-9_]+'   # example; team may replace

# Series classification (folder basename + SeriesDescription). Substring unless pattern looks like regex.
# Order matters: first match wins (more specific first).
classification_rules:
  - class: dwi
    patterns: ["DTI", "DWI", "DIFFUSION", "dwi", "dti", "DIFF"]
  - class: bold
    patterns: ["fMRI", "fmri", "BOLD", "RESTING", "rsfMRI", "TASK", "EPI"]
  - class: asl
    patterns: ["ASL", "PCASL", "PASL"]
  - class: fmap
    patterns: ["field_map", "field map", "gre_field", "FMRI.*field"]
  - class: swi
    patterns: ["SWI", "SWAN", "SWI_"]
  - class: flair
    patterns: ["(?i).*(FLAIR|flair)\\s*$"]
  - class: perf
    patterns: ["perf", "Perf", "DSC", "DCE", "perfusion", "CBF"]
  - class: t1_anat
    patterns: ["MPRAGE", "SPGR", "FSPGR", "BRAVO", "IR FSPGR", "IR_FSPGR"]
  - class: t2_anat
    patterns: ["T2", "BLADE"]
  - class: localizer
    patterns: ["localizer", "Localizer", "LOC", "scout", "Scout"]
  - class: other
    patterns: []
